<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NodeChat - Real-time Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="auth-container">
    <div class="auth-box">
      <div class="logo">
        <h1>NODE<span>CHAT</span></h1>
      </div>
      <p class="subtitle">Connect and chat in real-time</p>
      
      <div id="login-form">
        <h2>Welcome Back</h2>
        <div class="input-group">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" placeholder="Enter your username" autocomplete="username">
        </div>
        <div class="input-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password">
        </div>
        <button id="login-btn">Login</button>
        <p class="switch-auth">Don't have an account? <span id="show-signup">Create one</span></p>
      </div>
      
      <div id="signup-form" style="display: none;">
        <h2>Create Account</h2>
        <div class="input-group">
          <label for="signup-fullname">Full Name</label>
          <input type="text" id="signup-fullname" placeholder="Enter your full name" autocomplete="name">
        </div>
        <div class="input-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" placeholder="Enter your email" autocomplete="email">
        </div>
        <div class="input-group">
          <label for="signup-username">Username</label>
          <input type="text" id="signup-username" placeholder="Choose a username (min 3 characters)" autocomplete="username">
        </div>
        <div class="input-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="Create a password (min 6 characters)" autocomplete="new-password">
        </div>
        <div class="input-group">
          <label for="signup-confirm-password">Confirm Password</label>
          <input type="password" id="signup-confirm-password" placeholder="Confirm your password" autocomplete="new-password">
        </div>
        <button id="signup-btn">Sign Up</button>
        <p class="switch-auth">Already have an account? <span id="show-login">Login here</span></p>
      </div>
      
      <p id="auth-error" class="error-message"></p>
    </div>
  </div>

  <div id="chat-container" style="display: none;">
    <div class="sidebar-left">
      <div class="sidebar-header">
        <div class="logo-small">
          <h2>NODE<span>CHAT</span></h2>
        </div>
        <div class="search-container-sidebar">
          <input type="text" id="search-input" placeholder="Search users..." autocomplete="off">
        </div>
      </div>
      <div class="conversations-list" id="conversations-list">
        <div id="search-results"></div>
      </div>
    </div>
    
    <div class="chat-area">
      <div class="chat-header">
        <div class="header-left">
          <div class="user-avatar" id="chat-avatar"></div>
          <span class="conversation-username" id="chat-username">Select a conversation</span>
        </div>
        <div class="header-actions">
          <div class="chat-menu" id="chat-menu" style="display: none;">
            <button class="menu-toggle" id="menu-toggle">⋯</button>
            <div class="menu-dropdown" id="menu-dropdown">
              <div class="menu-item" id="set-nickname">Set Nickname</div>
            </div>
          </div>
          <span id="current-user"></span>
          <button id="logout-btn" title="Logout" onclick="localStorage.removeItem('nodechat_user'); location.reload();">Logout</button>
        </div>
      </div>
      
      <div id="chat-view">
        <div id="messages">
          <div class="empty-state">
            <h3>Welcome to NodeChat</h3>
            <p>Search for a user to start a conversation</p>
          </div>
        </div>
        
        <div id="typing-indicator"></div>
        
        <div class="message-input">
          <input type="text" id="message-input" placeholder="Select a user to start messaging..." autocomplete="off" disabled>
          <button id="send-btn" disabled>➤</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Nickname Modal -->
  <div id="nickname-modal" class="nickname-modal">
    <div class="nickname-modal-content">
      <h3>Set Nickname</h3>
      <input type="text" id="nickname-input" placeholder="Enter nickname..." maxlength="20">
      <div class="nickname-modal-buttons">
        <button class="nickname-save" id="nickname-save">Save</button>
        <button class="nickname-cancel" id="nickname-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
